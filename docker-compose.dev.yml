services:
  mongodb:
    image: mongo:7
    container_name: nkp-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: nutanix-nkp-demo
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Uncomment when running backend in Docker (Phase 2+).
  # The socket mount lets the backend create/manage lab containers on the host.
  # backend:
  #   build: { context: ./backend, dockerfile: ../docker/Dockerfile.backend }
  #   volumes:
  #     - ./backend:/app
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   ports:
  #     - "5000:5000"
  #   depends_on:
  #     mongodb:
  #       condition: service_healthy

volumes:
  mongo_data:

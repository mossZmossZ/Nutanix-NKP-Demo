version: '3.8'

# Production — all services containerized, no hot-reload volumes.
# Usage:
#   cp .env.prod.example .env.prod   # fill in secrets
#   docker compose -f docker-compose.prod.yml up --build -d

services:
  mongodb:
    image: mongo:7
    container_name: nkp-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: nutanix-nkp-demo
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend.prod
    container_name: nkp-backend
    restart: always
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/nutanix-nkp-demo?authSource=admin
    volumes:
      # Required for Container Labs — backend provisions Docker containers on the host
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_PDF_URL: ${VITE_PDF_URL:-}
    container_name: nkp-frontend
    restart: always
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: nkp-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  mongo_data:

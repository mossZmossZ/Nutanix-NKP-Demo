upstream backend {
    server backend:5000;
}

upstream frontend {
    server frontend:80;
}

# Lab slot → container alias (lab-cs-<slot> is set when provisioning attaches the
# lab container to this network — Docker DNS resolves it natively via 127.0.0.11)
map $uri $lab_backend {
    ~^/lab/10/  lab-cs-10:8080;
    ~^/lab/11/  lab-cs-11:8080;
    ~^/lab/12/  lab-cs-12:8080;
    ~^/lab/13/  lab-cs-13:8080;
    ~^/lab/14/  lab-cs-14:8080;
    ~^/lab/15/  lab-cs-15:8080;
    ~^/lab/16/  lab-cs-16:8080;
    ~^/lab/17/  lab-cs-17:8080;
    ~^/lab/18/  lab-cs-18:8080;
    ~^/lab/19/  lab-cs-19:8080;
    ~^/lab/20/  lab-cs-20:8080;
    ~^/lab/21/  lab-cs-21:8080;
    ~^/lab/22/  lab-cs-22:8080;
    ~^/lab/23/  lab-cs-23:8080;
    ~^/lab/24/  lab-cs-24:8080;
    ~^/lab/25/  lab-cs-25:8080;
    ~^/lab/26/  lab-cs-26:8080;
    ~^/lab/27/  lab-cs-27:8080;
    ~^/lab/28/  lab-cs-28:8080;
    ~^/lab/29/  lab-cs-29:8080;
    ~^/lab/30/  lab-cs-30:8080;
    ~^/lab/1/   lab-cs-1:8080;
    ~^/lab/2/   lab-cs-2:8080;
    ~^/lab/3/   lab-cs-3:8080;
    ~^/lab/4/   lab-cs-4:8080;
    ~^/lab/5/   lab-cs-5:8080;
    ~^/lab/6/   lab-cs-6:8080;
    ~^/lab/7/   lab-cs-7:8080;
    ~^/lab/8/   lab-cs-8:8080;
    ~^/lab/9/   lab-cs-9:8080;
    default     "";
}

server {
    listen 80;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 50m;

    # Lab code-server proxy — /lab/<slot>/ → lab container directly on internal network
    location ~ ^/lab/ {
        if ($lab_backend = "") { return 404; }

        resolver 127.0.0.11 valid=30s;
        set $cs_upstream $lab_backend;

        proxy_pass http://$cs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    # API — proxy to backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_cache_bypass $http_upgrade;
    }

    # Everything else — frontend SPA
    location / {
        add_header X-Frame-Options "SAMEORIGIN" always;
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

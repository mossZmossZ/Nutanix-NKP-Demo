upstream backend {
    server backend:5000;
}

upstream frontend {
    server frontend:80;
}

# code-server slot → host port mapping (slots 1–30, double-digit first to avoid prefix clash)
map $uri $lab_cs_port {
    ~^/lab/10/  5610;
    ~^/lab/11/  5611;
    ~^/lab/12/  5612;
    ~^/lab/13/  5613;
    ~^/lab/14/  5614;
    ~^/lab/15/  5615;
    ~^/lab/16/  5616;
    ~^/lab/17/  5617;
    ~^/lab/18/  5618;
    ~^/lab/19/  5619;
    ~^/lab/20/  5620;
    ~^/lab/21/  5621;
    ~^/lab/22/  5622;
    ~^/lab/23/  5623;
    ~^/lab/24/  5624;
    ~^/lab/25/  5625;
    ~^/lab/26/  5626;
    ~^/lab/27/  5627;
    ~^/lab/28/  5628;
    ~^/lab/29/  5629;
    ~^/lab/30/  5630;
    ~^/lab/1/   5601;
    ~^/lab/2/   5602;
    ~^/lab/3/   5603;
    ~^/lab/4/   5604;
    ~^/lab/5/   5605;
    ~^/lab/6/   5606;
    ~^/lab/7/   5607;
    ~^/lab/8/   5608;
    ~^/lab/9/   5609;
    default     "";
}

server {
    listen 80;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 50m;

    # Lab code-server proxy — /lab/<slot>/ → container's code-server via host-bound port
    location ~ ^/lab/ {
        if ($lab_cs_port = "") { return 404; }

        resolver 127.0.0.11 valid=30s;
        set $cs_upstream "host.docker.internal:$lab_cs_port";

        proxy_pass http://$cs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    # API — proxy to backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_cache_bypass $http_upgrade;
    }

    # Everything else — frontend SPA
    location / {
        add_header X-Frame-Options "SAMEORIGIN" always;
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

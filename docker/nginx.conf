# Map slot number in URI → internal code-server port (slot N → 5600+N)
map $uri $lab_port {
    ~^/lab/slot1/   5601;
    ~^/lab/slot2/   5602;
    ~^/lab/slot3/   5603;
    ~^/lab/slot4/   5604;
    ~^/lab/slot5/   5605;
    ~^/lab/slot6/   5606;
    ~^/lab/slot7/   5607;
    ~^/lab/slot8/   5608;
    ~^/lab/slot9/   5609;
    ~^/lab/slot10/  5610;
    ~^/lab/slot11/  5611;
    ~^/lab/slot12/  5612;
    ~^/lab/slot13/  5613;
    ~^/lab/slot14/  5614;
    ~^/lab/slot15/  5615;
    ~^/lab/slot16/  5616;
    ~^/lab/slot17/  5617;
    ~^/lab/slot18/  5618;
    ~^/lab/slot19/  5619;
    ~^/lab/slot20/  5620;
    ~^/lab/slot21/  5621;
    ~^/lab/slot22/  5622;
    ~^/lab/slot23/  5623;
    ~^/lab/slot24/  5624;
    ~^/lab/slot25/  5625;
    ~^/lab/slot26/  5626;
    ~^/lab/slot27/  5627;
    ~^/lab/slot28/  5628;
    ~^/lab/slot29/  5629;
    ~^/lab/slot30/  5630;
    default         5600;
}

# WebSocket upgrade header handling
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream backend {
    server backend:5000;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Docker's internal DNS — required for variable-based proxy_pass
    resolver 127.0.0.11 valid=30s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 50m;

    # Lab code-server — proxy through host's internal bridge IP (172.22.0.1)
    # code-server is started with --base-path /lab/slotN/ so the full URI is preserved
    location ~ ^/lab/slot\d+/ {
        set $lab_upstream http://172.22.0.1:$lab_port;
        proxy_pass $lab_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # API — proxy to backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_cache_bypass $http_upgrade;
    }

    # Everything else — frontend SPA
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
